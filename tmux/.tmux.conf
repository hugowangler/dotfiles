set-option -g default-command 'zsh'
set-option -g focus-events on
# prefix key
#set-option -g default-command '/bin/bash'
set -g prefix C-a
bind C-a send-prefix

bind -n M-j split-window -v
bind -n M-k split-window -v
bind -n M-h split-window -h
bind -n M-l split-window -h

# Cmd+h/j/k/l pane splitting (iTerm2 sends C-a + Shift-h/j/k/l via hex codes)
bind H split-window -h
bind L split-window -h
bind J split-window -v
bind K split-window -v

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# enable mouse
set -g mouse on

# scrollback buffer
set -g history-limit 50000

# vi keys in copy mode
setw -g mode-keys vi

# fix slow vim ESC time
set -s escape-time 0

# start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# plugins
set -g @plugin 'tmux-plugins/tmux-yank'

# True colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# set -g window-style 'bg=#282c34'

run '~/.tmux/plugins/tpm/tpm'
