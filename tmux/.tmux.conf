set-option -g focus-events on
set -g prefix C-a
bind C-a send-prefix

# Cmd+h/j/k/l pane splitting (iTerm2 sends Esc+h/j/k/l via "Send Escape Sequence")
bind -n M-h split-window -hb -c "#{pane_current_path}"
bind -n M-l split-window -h  -c "#{pane_current_path}"
bind -n M-j split-window -v  -c "#{pane_current_path}"
bind -n M-k split-window -vb -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind q kill-pane
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -n C-^ last-window
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# pass extended key sequences (e.g. Shift+Enter) to applications
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Pane focus: dim inactive panes, highlight active border
set -g window-style 'bg=#16161e'
set -g window-active-style 'bg=#1a1b26'
set -g pane-border-style 'fg=#283457'
set -g pane-active-border-style 'fg=#7aa2f7'

# Command prompt / message styling
set -g message-style "bg=#1a1b26,fg=#7aa2f7,bold"
set -g message-command-style "bg=#414868,fg=#c0caf5"

# Status bar
set -g status-position top
set -g status-justify centre
set -g status-style "bg=default,fg=#565f89"
set -g status-left " #S "
set -g status-left-style "fg=#565f89,bold"
set -g status-left-length 20
set -g status-right ""
set -g window-status-format " #I:#W "
set -g window-status-style "fg=#565f89,bg=default"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#c0caf5,bg=default,bold,underscore"

# plugins
set -g @plugin 'tmux-plugins/tmux-yank'


run '~/.tmux/plugins/tpm/tpm'
